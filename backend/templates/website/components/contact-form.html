{% load static %}

<div class="contact-form-card">
  <div class="form-header">
    <span class="section-subtitle">Get In Touch</span>
    <h2 class="contact-section-title">Send Us A Message</h2>
    <p class="contact-section-desc">
      Have questions about our premium services or need assistance with a
      pickup? Fill out the form below and we will get back to you shortly.
    </p>
  </div>
  <form id="contact-message-form" class="contact-form">
    <div class="form-row">
      <div class="form-group">
        <label for="contact-name">Full Name</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-user input-icon"></i
          ><input
            type="text"
            id="contact-name"
            name="name"
            placeholder="John Doe"
            required
          />
        </div>
      </div>
      <div class="form-group">
        <label for="contact-email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope input-icon"></i
          ><input
            type="email"
            id="contact-email"
            name="email"
            placeholder="john@example.com"
            required
          />
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="contact-phone">Phone Number</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-phone input-icon"></i
          ><input
            type="tel"
            id="contact-phone"
            name="phone"
            placeholder="+971 50 000 0000"
            required
          />
        </div>
      </div>
      <div class="form-group">
        <label for="contact-subject">Subject</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-folder-open input-icon"></i
          ><select id="contact-subject" name="subject" required>
            <option value="" disabled selected>Select a subject</option>
            <option value="general">General Inquiry</option>
            <option value="pickup">Schedule Pickup</option>
            <option value="pricing">Pricing & Services</option>
            <option value="corporate">Corporate Accounts</option>
            <option value="custom_location">
              Custom Location Order / Inquiry
            </option>
            <option value="feedback">Feedback & Suggestions</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group full-width">
      <label for="contact-message">Your Message</label>
      <div class="input-wrapper">
        <i class="fa-regular fa-comment-dots textarea-icon input-icon"></i
        ><textarea
          id="contact-message"
          name="message"
          placeholder="How can we help you?"
          required
        ></textarea>
      </div>
    </div>
    <button type="submit" class="contact-submit-btn">
      <span>Send Message</span><i class="fa-solid fa-paper-plane"></i>
    </button>
  </form>
</div>
