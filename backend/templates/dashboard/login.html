{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM-DASHBOARD</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}" />

    <style>
      body {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        overflow: hidden;
        position: relative;
      }

      .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -1;
      }

      .shape {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
      }

      .shape:nth-child(1) { width: 120px; height: 120px; top: 10%; left: 10%; animation-delay: 0s; }
      .shape:nth-child(2) { width: 180px; height: 180px; top: 70%; left: 80%; animation-delay: 2s; }
      .shape:nth-child(3) { width: 90px; height: 90px; top: 40%; left: 5%; animation-delay: 4s; }
      .shape:nth-child(4) { width: 140px; height: 140px; top: 20%; right: 15%; animation-delay: 1s; }
      .shape:nth-child(5) { width: 70px; height: 70px; bottom: 15%; left: 20%; animation-delay: 3s; }
      .shape:nth-child(6) { width: 100px; height: 100px; bottom: 30%; right: 10%; animation-delay: 5s; }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
        25% { transform: translateY(-20px) rotate(90deg); opacity: 0.5; }
        50% { transform: translateY(-40px) rotate(180deg); opacity: 0.8; }
        75% { transform: translateY(-20px) rotate(270deg); opacity: 0.6; }
      }

      .login-card {
        width: 400px;
        max-width: 90vw;
        position: relative;
        z-index: 10;
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        animation: fadeInUp 0.8s ease-out;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        animation: shimmer 3s infinite;
      }

      @keyframes shimmer {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: 100%; }
      }

      @keyframes fadeInUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .card-header {
        background-color: transparent;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-bottom: none;
        padding-bottom: 0;
        position: relative;
        z-index: 2;
      }

      .logo {
        width: 350px;
        height: auto;
        margin-bottom: 20px;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        transition: all 0.3s ease;
      }

      .logo:hover {
        transform: scale(1.02);
        filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
      }

      .login-title {
        color: #2b2b2b;
        font-weight: 700;
        margin-bottom: 25px;
        font-size: 1.5rem;
        background: linear-gradient(45deg, var(--primary-color), var(--primary-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: pulse 2s ease-in-out infinite alternate;
      }

      @keyframes pulse {
        from { opacity: 0.8; }
        to { opacity: 1; }
      }

      .input-group-text {
        background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        border-right: none;
        font-size: 18px;
        color: #2b2b2b;
        border: 1px solid #e3e6f0;
        transition: all 0.3s ease;
      }

      .form-control {
        border-left: none;
        border: 1px solid #e3e6f0;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.9);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
        border: none;
        border-radius: 50px;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 100%;
        max-width: 300px;
        position: relative;
        overflow: hidden;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 8px 25px rgba(var(--primary-dark-rgb), 0.4);
      }

      .btn-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s;
      }

      .btn-primary:hover::before { left: 100%; }

      .btn-primary:hover {
        background: linear-gradient(135deg, var(--primary-hover) 0%, var(--primary-dark) 100%);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 15px 35px rgba(var(--primary-dark-rgb), 0.6);
      }

      .btn-primary:active { transform: translateY(-1px) scale(0.98); }

      .input-group {
        width: 100%;
        max-width: 300px;
        border-radius: 15px;
        overflow: hidden;
        margin-bottom: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .input-group:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }

      .card-body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-top: 15px;
        position: relative;
        z-index: 2;
      }

      .text-end a {
        color: var(--primary-color);
        font-weight: bold;
        text-decoration: none;
        transition: all 0.3s ease;
        position: relative;
      }

      .text-end a::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -3px;
        left: 50%;
        background: linear-gradient(45deg, var(--primary-color), var(--primary-dark));
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }

      .text-end a:hover::after { width: 100%; }
      .text-end a:hover { color: var(--primary-hover); transform: translateY(-2px); }

      .alert {
        max-width: 300px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: none;
        backdrop-filter: blur(10px);
        animation: slideInDown 0.5s ease-out;
      }

      @keyframes slideInDown {
        from { transform: translateY(-30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .alert-danger {
        background: rgba(220, 53, 69, 0.1);
        color: #721c24;
        border: 1px solid rgba(220, 53, 69, 0.3);
      }

      .alert-success {
        background: rgba(40, 167, 69, 0.1);
        color: #155724;
        border: 1px solid rgba(40, 167, 69, 0.3);
      }

      .popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .popup-content {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        max-width: 90vw;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        position: relative;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      @keyframes popIn {
        from { transform: scale(0.3) rotate(10deg); opacity: 0; }
        to { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      .close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 28px;
        font-weight: bold;
        color: #666;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }

      .close:hover {
        color: #ff4757;
        background: rgba(255, 71, 87, 0.1);
        transform: rotate(90deg) scale(1.1);
      }

      @media (max-width: 768px) {
        .login-card { width: 95vw; }
        .card { padding: 20px; }
        .logo { width: 200px; }
        .shape { opacity: 0.5; }
      }

      .btn-primary.loading {
        pointer-events: none;
        position: relative;
        color: transparent;
      }

      .btn-primary.loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>

    <div class="login-card card">
      <div class="card-header">
        <img src="{% static 'dashboard/img/logo.png' %}" class="logo" alt="Logo" />
        <h4 class="login-title">Login</h4>
      </div>

      <div class="card-body">

        {% if error %}
        <div class="popup" id="popup-message">
          <div class="popup-content">
            <span class="close" onclick="document.getElementById('popup-message').style.display='none'">&times;</span>
            <div class="alert alert-danger">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              {{ error }}
            </div>
          </div>
        </div>
        {% endif %}

        <form method="post" id="loginForm">
          {% csrf_token %}

          <div class="input-group mb-3">
            <span class="input-group-text bg-white">
              <i class="bi bi-person"></i>
            </span>
            <input
              type="text"
              name="username"
              class="form-control"
              id="id_username"
              placeholder="Username"
              required
            />
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text bg-white">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              name="password"
              class="form-control"
              id="id_password"
              placeholder="Password"
              required
            />
          </div>

          <div class="text-end mb-3">
            <a href="#" class="text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="bi bi-box-arrow-in-right me-2"></i> Login
          </button>
        </form>

      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script>
      toastr.options = {
        closeButton: true,
        progressBar: true,
        positionClass: "toast-top-right",
        timeOut: "5000",
        showEasing: "swing",
        hideEasing: "linear",
        showMethod: "fadeIn",
        hideMethod: "fadeOut"
      };

      {% if error %}
        document.getElementById("popup-message").style.display = "flex";
      {% endif %}

      document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginBtn');
        const inputs = document.querySelectorAll('.form-control');

        form.addEventListener('submit', function () {
          submitBtn.classList.add('loading');
          submitBtn.disabled = true;
        });

        inputs.forEach(input => {
          input.addEventListener('focus', function () {
            this.parentElement.style.transform = 'translateY(-2px)';
          });
          input.addEventListener('blur', function () {
            this.parentElement.style.transform = 'translateY(0)';
          });
        });

        submitBtn.addEventListener('click', function (e) {
          createParticleEffect(e);
        });

        function createParticleEffect(e) {
          const rect = e.target.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          for (let i = 0; i < 12; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.background = '#ffffff';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.zIndex = '9999';

            e.target.appendChild(particle);

            const angle = (Math.PI * 2 * i) / 12;
            const velocity = 20 + Math.random() * 20;

            particle.animate([
              { transform: 'translate(0, 0) scale(1)', opacity: 1 },
              {
                transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`,
                opacity: 0
              }
            ], {
              duration: 600,
              easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            }).addEventListener('finish', () => particle.remove());
          }
        }

        document.getElementById('popup-message')?.addEventListener('click', function (e) {
          if (e.target === this) this.style.display = 'none';
        });
      });
    </script>
  </body>
</html>
